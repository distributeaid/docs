config:
  # Disable rules that conflict with Prettier
  MD003: false # heading style
  MD004: false # unordered list style
  MD007: false # unordered list indentation
  MD009: false # trailing spaces
  MD010: false # hard tabs
  MD012: false # multiple consecutive blank lines
  MD013: false # line length
  MD022: false # blanks around headings
  MD030: false # spaces after list markers
  MD031: false # blanks around fences
  MD032: false # blanks around lists
  MD047: false # files should end with a single newline

  # Disable other noisy rules
  MD029: false # ordered list item prefix (Starlight content uses non-sequential numbering)
  MD033: false # inline HTML (legitimate in markdown docs for figures, etc.)
  MD041: false # first line should be a heading (Starlight uses frontmatter)
  MD060: false # table column style (Prettier handles table formatting)

  # Keep structural/semantic/a11y rules
  MD001: true # heading levels should only increment by one
  MD024: true # no duplicate heading content
  MD025: true # single top-level heading
  MD034: true # no bare URLs
  MD036: true # no emphasis as headings
  MD040: true # fenced code blocks should have a language
  MD045: true # images should have alt text
  MD051: true # link fragments should be valid
  MD053: true # link and image reference definitions should be needed
  MD059: true # link and image URLs should not contain unnecessary characters

globs:
  - '**/*.md'
  - '!node_modules'
  - '!dist'
  - '!.yarn'
